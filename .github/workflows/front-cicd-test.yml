name: Next.js Test CI/CD Pipeline

on:
  push:
    branches:
      - master    # dev 브랜치에 푸시될 때 실행

env:
  EC2_HOST: ${{ secrets.EC2_HOST_TEST }}  # 환경변수로 IP 주소 설정

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_TEST }}
          NEXT_PUBLIC_S3_URL: ${{ secrets.NEXT_PUBLIC_S3_URL_TEST }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_TEST }}
          password: ${{ secrets.DOCKERHUB_PASSWORD_TEST }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_REPO_TEST }}:test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH 연결 테스트
        run: |
          echo "${{ secrets.EC2_SSH_KEY_TEST }}" > private_key
          chmod 600 private_key
          ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.EC2_USER_TEST }}@${{ env.EC2_HOST }} 'echo SSH 연결 성공'

      - name: Deploy to Test EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.EC2_HOST }}    # 환경변수 사용
          username: ${{ secrets.EC2_USER_TEST }}
          key: ${{ secrets.EC2_SSH_KEY_TEST }}
          port: 22
          script: |
            # 최신 테스트 이미지 풀
            docker pull ${{ secrets.DOCKER_REPO_TEST }}:test
            
            # 기존 테스트 컨테이너 중지 및 제거
            docker stop nextjs-frontend-test || true
            docker rm nextjs-frontend-test || true
            
            # 새 테스트 컨테이너 실행
            sudo docker run -d \
              --name nextjs-frontend-test \
              -p 3000:3000 \
              -e NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_TEST }} \
              -e NEXT_PUBLIC_S3_URL=${{ secrets.NEXT_PUBLIC_S3_URL_TEST }} \
              ${{ secrets.DOCKER_REPO_TEST }}:test